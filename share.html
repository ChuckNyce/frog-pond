<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7f3ea" />
  <title>frog pond</title>
  <meta property="og:site_name" content="frog pond" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .share-wrap {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .share-inner { width: 100%; max-width: 520px; }
    .share-logo { font-size: 12px; color: var(--dim); margin-bottom: 2.5rem; text-align: center; }
    .share-logo a { color: var(--mid); text-decoration: none; }
    .share-logo a:hover { color: var(--accent); }
    .share-box { border: 1px solid var(--border); background: var(--surface); margin-bottom: 1rem; }
    .share-bar {
      padding: 0.35rem 0.75rem; border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--dim);
      display: flex; justify-content: space-between;
      background: rgba(0,0,0,0.02);
    }
    .share-body { padding: 2rem 1rem 1.5rem; }
    .share-source {
      font-size: 11px; color: var(--dim); margin-bottom: 1.25rem;
      padding-left: 0.75rem; border-left: 2px solid var(--border);
    }
    .share-source::before { content: "// "; }
    .share-line-row { display: flex; gap: 1rem; align-items: baseline; margin-bottom: 0.4rem; }
    .share-line-num { font-size: 11px; color: var(--dim); width: 14px; flex-shrink: 0; }
    .share-line-text {
      font-family: var(--serif); font-style: italic;
      font-size: clamp(22px, 5vw, 28px); color: var(--text); line-height: 1.5;
    }
    .share-syl-bars {
      display: flex; gap: 1.25rem;
      font-size: 11px; letter-spacing: 2px; color: var(--border);
      margin-top: 1.25rem; padding-top: 0.75rem; border-top: 1px solid var(--border);
    }
    .share-syl-filled { color: var(--accent); }
    .share-actions { display: flex; border: 1px solid var(--border); }
    .share-action-btn {
      flex: 1; padding: 0.5rem; background: transparent; border: none;
      border-right: 1px solid var(--border); color: var(--mid);
      font-family: var(--mono); font-size: 13px; cursor: pointer;
      transition: color 0.1s, background 0.1s; text-align: center;
      text-decoration: none; display: flex; align-items: center; justify-content: center;
    }
    .share-action-btn:last-child { border-right: none; }
    .share-action-btn:hover { color: var(--accent); background: rgba(74,106,48,0.04); }
    .share-action-btn.ok { color: var(--green); }
    .share-action-btn.cta {
      color: var(--accent);
      border-color: var(--accent);
    }
    .share-action-btn.cta:hover { background: rgba(74,106,48,0.08); }
    .share-tagline {
      font-size: 11px;
      color: var(--dim);
      text-align: center;
      margin-top: 0.75rem;
    }
    .share-error { font-size: 13px; color: var(--red); padding: 0.75rem; border: 1px solid var(--red); }
    .share-error::before { content: "err: "; opacity: 0.6; }
  </style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle">[ dark ]</button>
<div class="share-wrap">
  <div class="share-inner">

    <div class="share-logo"><a href="/">[ frog pond // 俳句 ]</a></div>

    <div id="share-error" class="share-error hidden">this link looks broken.</div>

    <div id="share-box" class="share-box hidden">
      <div class="share-bar">
        <span>output.haiku</span>
        <span style="color:var(--green)">✓ generated</span>
      </div>
      <div class="share-body">
        <div id="share-source" class="share-source hidden"></div>
        <div id="share-lines"></div>
        <div id="share-syl" class="share-syl-bars hidden"></div>
      </div>
    </div>

    <div id="share-actions" class="share-actions hidden">
      <button class="share-action-btn" id="copy-haiku">copy haiku</button>
      <button class="share-action-btn" id="save-image">save image</button>
      <button class="share-action-btn" id="copy-link">copy link</button>
      <a class="share-action-btn cta" href="/">make your own →</a>
    </div>

    <p class="share-tagline hidden" id="share-tagline">paste any post. get a haiku.</p>

  </div>
</div>
<script>
  // ── Dark mode ──
  (function() {
    const saved = localStorage.getItem('fp_theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const isDark = saved ? saved === 'dark' : prefersDark;
    const t = isDark ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('theme-toggle').textContent = isDark ? '[ light ]' : '[ dark ]';
  })();

  document.getElementById('theme-toggle').addEventListener('click', function() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    this.textContent = next === 'dark' ? '[ light ]' : '[ dark ]';
    localStorage.setItem('fp_theme', next);
  });

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function sylBar(count, total) {
    const f = Math.min(count ?? total, total);
    return `<span class="share-syl-filled">${'█'.repeat(f)}</span>${'░'.repeat(total - f)}`;
  }
  try {
    const params = new URLSearchParams(window.location.search);
    const encoded = params.get('h');
    if (!encoded) throw new Error('no data');
    const data = JSON.parse(atob(encoded));
    const { line1, line2, line3, s1, s2, s3, source } = data;
    if (!line1 || !line2 || !line3) throw new Error('bad data');

    document.title = `${line1} / ${line2} / ${line3} — frog pond`;

    const ogDesc = document.createElement('meta');
    ogDesc.setAttribute('property', 'og:description');
    ogDesc.setAttribute('content', `${line1}\n${line2}\n${line3}`);
    document.head.appendChild(ogDesc);

    if (source) {
      const el = document.getElementById('share-source');
      el.textContent = source.length > 80 ? source.slice(0, 80) + '…' : source;
      el.classList.remove('hidden');
    }

    const linesEl = document.getElementById('share-lines');
    [[line1,s1??5,5],[line2,s2??7,7],[line3,s3??5,5]].forEach(([line, count, total]) => {
      const row = document.createElement('div');
      row.className = 'share-line-row';
      row.innerHTML = `<span class="share-line-num">${total}</span><span class="share-line-text">${esc(line)}</span>`;
      linesEl.appendChild(row);
    });

    const sylEl = document.getElementById('share-syl');
    [[s1??5,5],[s2??7,7],[s3??5,5]].forEach(([c,t]) => {
      const span = document.createElement('span');
      span.innerHTML = sylBar(c, t);
      sylEl.appendChild(span);
    });
    sylEl.classList.remove('hidden');

    document.getElementById('share-box').classList.remove('hidden');
    document.getElementById('share-actions').classList.remove('hidden');
    document.getElementById('share-tagline').classList.remove('hidden');

    const fullText = `${line1}\n${line2}\n${line3}`;

    document.getElementById('copy-haiku').addEventListener('click', function() {
      navigator.clipboard.writeText(fullText + '\n\n-- frogpond.app').then(() => {
        this.textContent = '// copied!'; this.classList.add('ok');
        setTimeout(() => { this.textContent = 'copy haiku'; this.classList.remove('ok'); }, 1800);
      });
    });
    document.getElementById('copy-link').addEventListener('click', function() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        this.textContent = '// link copied!'; this.classList.add('ok');
        setTimeout(() => { this.textContent = 'copy link'; this.classList.remove('ok'); }, 1800);
      });
    });

    document.getElementById('save-image').addEventListener('click', async function() {
      const btn = this;
      const orig = btn.textContent;
      btn.textContent = '// generating...'; btn.classList.add('ok');

      try {
        await document.fonts.ready;

        const W = 1080, H = 1080;
        const cvs = document.createElement('canvas');
        cvs.width = W; cvs.height = H;
        const ctx = cvs.getContext('2d');

        const bgC = '#f7f3ea', textC = '#2c2418', dimC = '#887050', accentC = '#4a6a30', borderC = '#c8bfa8';
        const monoF = "'Courier New', monospace", serifF = "'IM Fell English', Georgia, serif";

        ctx.fillStyle = bgC; ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = borderC; ctx.lineWidth = 1; ctx.strokeRect(0.5, 0.5, W - 1, H - 1);

        const LEFT = 100, TEXT_LEFT = 140;
        let y = 120;

        if (source) {
          const trunc = source.length > 60 ? source.slice(0, 60) + '…' : source;
          ctx.font = '20px ' + monoF; ctx.fillStyle = dimC; ctx.textBaseline = 'top';
          ctx.fillText('// ' + trunc, LEFT, y); y += 50;
        }

        const lineH = 70;
        const haikuStart = y + ((H - 200 - y) - lineH * 3) / 2;
        y = haikuStart;

        [[line1, 5], [line2, 7], [line3, 5]].forEach(function(pair) {
          ctx.font = '22px ' + monoF; ctx.fillStyle = dimC; ctx.textBaseline = 'top';
          ctx.fillText(String(pair[1]), LEFT, y + 16);
          ctx.font = 'italic 52px ' + serifF; ctx.fillStyle = textC;
          ctx.fillText(pair[0], TEXT_LEFT, y);
          y += lineH;
        });

        y += 30;
        ctx.font = '18px ' + monoF; ctx.textBaseline = 'top';
        var barX = LEFT;
        [[s1??5,5],[s2??7,7],[s3??5,5]].forEach(function(pair, i) {
          var filled = Math.min(pair[0] ?? pair[1], pair[1]);
          var fStr = '█'.repeat(filled), uStr = '░'.repeat(pair[1] - filled);
          ctx.fillStyle = accentC; ctx.fillText(fStr, barX, y);
          ctx.fillStyle = borderC; ctx.fillText(uStr, barX + ctx.measureText(fStr).width, y);
          if (i < 2) barX += ctx.measureText(fStr + uStr).width + 25;
        });

        ctx.font = '20px ' + monoF; ctx.fillStyle = dimC; ctx.textBaseline = 'bottom';
        var brand = '@..@ frogpond.lol';
        ctx.fillText(brand, (W - ctx.measureText(brand).width) / 2, H - 80);

        cvs.toBlob(async function(blob) {
          try {
            if (navigator.share && navigator.canShare) {
              var file = new File([blob], 'haiku-frogpond.png', { type: 'image/png' });
              if (navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'haiku — frogpond.lol' });
                btn.textContent = '// saved!';
                setTimeout(function() { btn.textContent = orig; btn.classList.remove('ok'); }, 1800);
                return;
              }
            }
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = 'haiku-frogpond.png';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
            btn.textContent = '// saved!';
            setTimeout(function() { btn.textContent = orig; btn.classList.remove('ok'); }, 1800);
          } catch(e) { btn.textContent = orig; btn.classList.remove('ok'); }
        }, 'image/png');
      } catch(e) { btn.textContent = orig; btn.classList.remove('ok'); }
    });
  } catch(e) {
    document.getElementById('share-error').classList.remove('hidden');
  }
</script>
</body>
</html>
